<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>✨ A Little Surprise for You ✨</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="step-container" id="appContainer">
  <h2>🌸 My Beautiful Surprise for You 🌸</h2>
  
  <audio id="loveMusic" loop preload="auto">
    <source src="krishna.audio.mp4.mp4" type="audio/mpeg">
  </audio>

  <div id="stepDisplay" class="step-card">
    <div class="message-area" id="mainMessage">
      🌙 Loading your special moment...
    </div>
    <div id="inputSection"></div>
    <div id="actionButtons" class="action-row"></div>
  </div>

  <div id="extraNote" style="margin-top: 15px; text-align: center;"></div>
  
  <div class="music-tip">
    <button id="playMusicBtn" class="btn" style="padding: 10px 26px; font-size:1.15rem;">🎵 Play Romantic Music</button>
    <span style="color:#dac0ff;">Listen while you read ❤️</span>
  </div>
</div>


<style> .btn { transition: all 0.12s; } input { background: #1f172b; border: 1px solid #bc9bcf; color: #f5e2ff; }</style>
<script src="script.jss"></script>
</body>
</html>
